services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus_standalone
    image: milvusdb/milvus:v2.5.11
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9191:9091"
    depends_on:
      - "etcd"
      - "minio"

  neo4j:
    container_name: recipe-neo4j
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/neo4j/data:/data
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/neo4j/logs:/logs
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/neo4j/plugins:/plugins
      - ${DOCKER_VOLUME_DIRECTORY:-.}/cypher:/import/cypher
    ports:
      - "7575:7575"
      - "7687:7687"

  api:
    container_name: graphrag-api
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["graph-rag-api"]
    environment:
      GRAPH_RAG_PROFILE: dev
      API_AUTH_ENABLED: "false"
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      SERVING_API_HOST: 0.0.0.0
      SERVING_API_PORT: 8000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
      MILVUS_HOST: standalone
      MILVUS_PORT: 19530
      INDEX_CACHE_DIR: /app/storage/indexes
      QUERY_TRACE_PATH: /app/storage/traces/query_trace.jsonl
    volumes:
      - ./storage:/app/storage
      - ./profiles:/app/profiles
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
      - standalone
    profiles:
      - api

  build-api:
    container_name: graphrag-build-api
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["graph-rag-build-api"]
    environment:
      GRAPH_RAG_PROFILE: dev
      API_AUTH_ENABLED: "false"
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      BUILD_API_HOST: 0.0.0.0
      BUILD_API_PORT: 8001
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
      MILVUS_HOST: standalone
      MILVUS_PORT: 19530
      INDEX_CACHE_DIR: /app/storage/indexes
      QUERY_TRACE_PATH: /app/storage/traces/query_trace.jsonl
    volumes:
      - ./storage:/app/storage
      - ./profiles:/app/profiles
    ports:
      - "8001:8001"
    depends_on:
      - neo4j
      - standalone
    profiles:
      - api
