minimum_pre_commit_version: "4.6.0"

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: python -m ruff check --fix
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: python -m ruff format
        language: system
        types_or: [python, pyi]
      - id: mypy
        name: mypy
        entry: python -m mypy --config-file pyproject.toml
        language: system
        pass_filenames: false
        files: ^(rag_modules/|main\.py$|main_build_service\.py$|tests/typecheck/|pyproject\.toml$)

